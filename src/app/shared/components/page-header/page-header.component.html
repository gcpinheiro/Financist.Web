<header class="page-header">
  <div>
    @if (eyebrow()) {
      <span class="page-header__eyebrow">{{ eyebrow() }}</span>
    }
    <h1>{{ title() }}</h1>
    @if (subtitle()) {
      <p>{{ subtitle() }}</p>
    }
  </div>

  <div class="page-header__actions">
    <ng-content select="[actions]" />
  </div>
</header>
