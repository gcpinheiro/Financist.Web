<div class="field">
  <label class="field__label" [for]="fieldId()">{{ label() }}</label>

  @switch (type()) {
    @case ('textarea') {
      <textarea
        class="field__control"
        [id]="fieldId()"
        [rows]="rows()"
        [placeholder]="placeholder()"
        [formControl]="resolvedControl()"
      ></textarea>
    }
    @case ('select') {
      <select class="field__control" [id]="fieldId()" [formControl]="resolvedControl()">
        <option value="">Select an option</option>
        @for (option of options(); track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    }
    @default {
      <input
        class="field__control"
        [id]="fieldId()"
        [type]="type()"
        [placeholder]="placeholder()"
        [autocomplete]="autocomplete()"
        [step]="type() === 'number' ? step() : null"
        [formControl]="resolvedControl()"
      />
    }
  }

  @if (showError()) {
    <small class="field__error">{{ errorMessage() }}</small>
  } @else if (hint()) {
    <small class="field__hint">{{ hint() }}</small>
  }
</div>
