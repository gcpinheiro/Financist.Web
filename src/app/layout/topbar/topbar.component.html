<header class="topbar surface-card">
  <div class="topbar__meta">
    <button class="topbar__icon-button topbar__menu" type="button" (click)="menuPressed.emit()">
      <app-icon name="menu" [size]="18" />
    </button>

    <div>
      <h1>{{ title() }}</h1>
      <p>{{ subtitle() }}</p>
    </div>
  </div>

  <div class="topbar__actions">
    <label class="topbar__search">
      <app-icon name="search" [size]="18" />
      <input type="search" placeholder="Buscar transações, metas ou documentos" />
    </label>

    <button class="topbar__icon-button topbar__desktop" type="button" (click)="compactPressed.emit()">
      <app-icon [name]="sidebarCompact() ? 'expand' : 'collapse'" [size]="18" />
    </button>

    <button class="topbar__icon-button" type="button">
      <app-icon name="bell" [size]="18" />
      <span class="topbar__notification-dot"></span>
    </button>

    <div class="topbar__profile">
      <div class="topbar__profile-copy">
        <strong>{{ userName() }}</strong>
        <span>{{ userRole() }}</span>
      </div>
      <div class="topbar__avatar">{{ userInitials() }}</div>
    </div>

    <button class="topbar__icon-button" type="button" (click)="logoutPressed.emit()">
      <app-icon name="logout" [size]="18" />
    </button>
  </div>
</header>
