<div class="feature-page">
  <app-page-header
    eyebrow="Cartoes"
    title="Gestao de cartoes"
    subtitle="Acompanhe limite, fechamento e vencimento com leitura simples."
  >
    <app-primary-button actions icon="plus" routerLink="/cards/new">Novo cartao</app-primary-button>
  </app-page-header>

  @if (loading() && !cards().length) {
    <app-loading-state label="Carregando cartoes..." />
  } @else if (cards().length) {
    <app-table-card
      title="Cartoes cadastrados"
      subtitle="Visualize os cartoes registrados e seus dados principais."
    >
      <app-data-table [columns]="columns" [rows]="cards()" trackByKey="id" />
    </app-table-card>
  } @else {
    <app-empty-state
      title="Nenhum cartao cadastrado"
      description="Adicione cartoes para acompanhar limite disponivel e vencimentos."
      icon="cards"
    />
  }
</div>
