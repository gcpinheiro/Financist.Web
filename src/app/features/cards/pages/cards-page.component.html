<div class="feature-page">
  <app-page-header
    eyebrow="Cartões"
    title="Gestão de cartões"
    subtitle="Acompanhe limite, fechamento e vencimento com leitura simples."
  >
    <app-primary-button actions icon="plus" routerLink="/cards/new">Novo cartão</app-primary-button>
  </app-page-header>

  @if (loading() && !cards().length) {
    <app-loading-state label="Carregando cartões..." />
  } @else if (cards().length) {
    <app-table-card
      title="Cartões cadastrados"
      subtitle="Visualize os cartões registrados e seus dados principais."
    >
      <app-data-table [columns]="columns" [rows]="cards()" trackByKey="id" />
    </app-table-card>
  } @else {
    <app-empty-state
      title="Nenhum cartão cadastrado"
      description="Adicione cartões para acompanhar limite disponível e vencimentos."
      icon="cards"
    />
  }
</div>
