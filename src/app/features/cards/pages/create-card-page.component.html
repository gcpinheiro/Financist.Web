<div class="create-page">
  <app-page-header
    eyebrow="Create"
    title="Register a card"
    subtitle="Store the exact card fields currently supported by the cards endpoint."
  />

  <app-section-card
    title="Card details"
    subtitle="Name, last four digits, limit amount, currency, and billing cycle dates."
  >
    <form class="create-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="create-page__grid">
        <app-form-field [form]="form" controlName="name" label="Card name" placeholder="Operations Black" />
        <app-form-field [form]="form" controlName="last4Digits" label="Last digits" placeholder="4821" />
        <app-form-field [form]="form" controlName="limitAmount" label="Credit limit" type="number" />
        <app-form-field [form]="form" controlName="currency" label="Currency" placeholder="USD" />
        <app-form-field [form]="form" controlName="closingDay" label="Closing day" type="number" />
        <app-form-field [form]="form" controlName="dueDay" label="Due day" type="number" />
      </div>

      <div class="create-page__actions">
        <app-secondary-button routerLink="/cards">Cancel</app-secondary-button>
        <app-primary-button type="submit" [disabled]="saving()">
          {{ saving() ? 'Saving...' : 'Create card' }}
        </app-primary-button>
      </div>
    </form>
  </app-section-card>
</div>
