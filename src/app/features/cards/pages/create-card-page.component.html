<div class="create-page">
  <app-page-header
    eyebrow="Cadastro"
    title="Novo cartão"
    subtitle="Registre os campos principais do cartão para acompanhar limite e ciclo."
  />

  <app-section-card
    title="Dados do cartão"
    subtitle="Nome, quatro dígitos finais, limite, moeda e datas do ciclo."
  >
    <form class="create-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="create-page__grid">
        <app-form-field [form]="form" controlName="name" label="Nome do cartão" placeholder="Operações Black" />
        <app-form-field [form]="form" controlName="last4Digits" label="Dígitos finais" placeholder="4821" />
        <app-form-field [form]="form" controlName="limitAmount" label="Limite de crédito" type="number" />
        <app-form-field [form]="form" controlName="currency" label="Moeda" placeholder="BRL" />
        <app-form-field [form]="form" controlName="closingDay" label="Dia de fechamento" type="number" />
        <app-form-field [form]="form" controlName="dueDay" label="Dia de vencimento" type="number" />
      </div>

      <div class="create-page__actions">
        <app-secondary-button routerLink="/cards">Cancelar</app-secondary-button>
        <app-primary-button type="submit" [disabled]="saving()">
          {{ saving() ? 'Salvando...' : 'Criar cartão' }}
        </app-primary-button>
      </div>
    </form>
  </app-section-card>
</div>
