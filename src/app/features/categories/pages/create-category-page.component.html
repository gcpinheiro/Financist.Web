<div class="create-page">
  <app-page-header
    eyebrow="Cadastro"
    title="Nova categoria"
    subtitle="Mantenha nome e tipo do fluxo consistentes para melhorar a leitura financeira."
  />

  <app-section-card
    title="Configuração da categoria"
    subtitle="Defina o nome e o tipo de fluxo para organizar os próximos lançamentos."
  >
    <form class="create-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="create-page__grid">
        <app-form-field [form]="form" controlName="name" label="Nome da categoria" placeholder="Software" />
        <app-form-field
          [form]="form"
          controlName="type"
          label="Tipo de fluxo"
          type="select"
          [options]="typeOptions"
        />
      </div>

      <div class="create-page__actions">
        <app-secondary-button routerLink="/categories">Cancelar</app-secondary-button>
        <app-primary-button type="submit" [disabled]="saving()">
          {{ saving() ? 'Salvando...' : 'Criar categoria' }}
        </app-primary-button>
      </div>
    </form>
  </app-section-card>
</div>
