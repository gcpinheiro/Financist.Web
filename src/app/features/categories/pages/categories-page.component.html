<div class="feature-page">
  <app-page-header
    eyebrow="Estrutura"
    title="Categorias"
    subtitle="Mantenha uma estrutura clara para dar contexto aos lançamentos."
  >
    <app-primary-button actions icon="plus" routerLink="/categories/new">Nova categoria</app-primary-button>
  </app-page-header>

  @if (loading() && !categories().length) {
    <app-loading-state label="Carregando categorias..." />
  } @else if (categories().length) {
    <app-table-card
      title="Categorias ativas"
      subtitle="Categorias disponíveis para lançamentos e leitura financeira."
    >
      <app-data-table [columns]="columns" [rows]="categories()" trackByKey="id" />
    </app-table-card>
  } @else {
    <app-empty-state
      title="Nenhuma categoria configurada"
      description="Crie categorias para organizar melhor receitas e despesas."
      icon="categories"
    />
  }
</div>
