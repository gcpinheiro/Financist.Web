<div class="settings-page">
  <app-page-header
    eyebrow="Conta"
    title="Configurações"
    subtitle="Espaço preparado para preferências, integrações e dados da conta."
  />

  <section class="settings-page__grid">
    <app-section-card
      title="Tema"
      subtitle="Escolha o tema da interface. O modo claro é o padrão do produto."
    >
      <div class="settings-page__theme-options">
        <button
          type="button"
          class="settings-page__theme-option"
          [class.settings-page__theme-option--active]="currentTheme() === 'light'"
          (click)="setTheme('light')"
        >
          <strong>Claro</strong>
          <span>Visual leve para uso diário. Este é o tema padrão.</span>
        </button>

        <button
          type="button"
          class="settings-page__theme-option"
          [class.settings-page__theme-option--active]="currentTheme() === 'dark'"
          (click)="setTheme('dark')"
        >
          <strong>Escuro</strong>
          <span>Reduz brilho e destaca informações em ambientes com pouca luz.</span>
        </button>
      </div>
    </app-section-card>

    <app-section-card
      title="Perfil e conta"
      subtitle="Use esta área para dados da organização, fuso horário e moeda padrão."
    >
      <p class="settings-page__copy">
        Este módulo já está organizado para receber ajustes operacionais sem precisar rever a
        arquitetura da tela no futuro.
      </p>
    </app-section-card>

    <app-section-card
      title="Integrações"
      subtitle="Mantenha espaço para chaves, conectores bancários e origens de importação."
    >
      <p class="settings-page__copy">
        Este painel pode evoluir para concentrar integrações externas e configurações de conexão.
      </p>
    </app-section-card>
  </section>
</div>
