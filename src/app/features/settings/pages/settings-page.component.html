<div class="settings-page">
  <app-page-header
    eyebrow="Workspace"
    title="Settings"
    subtitle="Placeholder settings layout prepared for profile, integrations, permissions, and environment preferences."
  />

  <section class="settings-page__grid">
    <app-section-card
      title="Profile and workspace"
      subtitle="Reserve this area for organization details, timezone, and default currency."
    >
      <p class="settings-page__copy">
        The settings module is intentionally structured as a production-ready placeholder so backend
        preferences and account management can be added without revisiting layout architecture.
      </p>
    </app-section-card>

    <app-section-card
      title="Integrations"
      subtitle="Keep room for API keys, bank connectors, and document import sources."
    >
      <p class="settings-page__copy">
        This panel can evolve into the operational hub for third-party integrations and backend
        connectivity configuration.
      </p>
    </app-section-card>
  </section>
</div>
