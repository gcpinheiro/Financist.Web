<section class="chat-container">
  <div #scrollHost class="chat-container__scroll">
    <div class="chat-container__rail">
      @for (message of messages(); track message.id) {
        <app-chat-message [message]="message" />
      }

      @if (loading()) {
        <div class="chat-container__typing-row">
          <div class="chat-container__typing-avatar">IA</div>
          <div class="chat-container__typing">
            <div class="chat-container__typing-dot"></div>
            <div class="chat-container__typing-dot"></div>
            <div class="chat-container__typing-dot"></div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
