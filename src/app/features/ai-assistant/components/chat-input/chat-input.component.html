<form class="chat-input" (ngSubmit)="submit()">
  <div class="chat-input__shell">
    <label class="chat-input__label" for="assistant-message">Mensagem para o assistente</label>

    <textarea
      #textarea
      id="assistant-message"
      [ngModel]="draft()"
      (ngModelChange)="updateDraft($event)"
      (keydown)="handleKeydown($event)"
      name="message"
      rows="1"
      placeholder="Digite sua pergunta..."
      [disabled]="loading()"
    ></textarea>

    <div class="chat-input__actions">
      <div class="chat-input__hint">
        <span class="chat-input__helper">
          {{ loading() ? 'Pensando...' : 'Pressione Enter para enviar. Use Shift + Enter para quebrar linha.' }}
        </span>
      </div>

      <button class="chat-input__submit" type="submit" [disabled]="loading() || !draft().trim()">
        <app-icon name="assistant" [size]="18" />
        <span>{{ loading() ? 'Pensando...' : 'Enviar' }}</span>
      </button>
    </div>
  </div>
</form>
