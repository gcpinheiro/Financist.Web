<header class="chat-header">
  <div class="chat-header__copy">
    <div class="chat-header__icon">
      <app-icon name="assistant" [size]="20" />
    </div>
    <div>
      <span class="chat-header__eyebrow">Análise conversacional</span>
      <h2>Assistente financeiro</h2>
      <p>Converse com o assistente para entender melhor sua situação financeira e os próximos passos.</p>
    </div>
  </div>

  <div class="chat-header__actions">
    <div class="chat-header__status">
      <span class="chat-header__status-dot"></span>
      Pronto para ajudar
    </div>
    <app-secondary-button icon="logout" (pressed)="clearPressed.emit()">Limpar conversa</app-secondary-button>
  </div>
</header>
