<div class="ai-assistant-page">
  <app-page-header
    eyebrow="Assistente"
    title="Assistente de IA"
    subtitle="Faca perguntas sobre gastos, receitas e metas em uma experiencia de chat integrada ao Financist."
  />

  <section class="ai-assistant-page__workspace surface-card">
    <app-chat-header (clearPressed)="clearConversation()" />
    <app-chat-container [messages]="messages()" [loading]="loading()" />
    <app-chat-input [loading]="loading()" (messageSubmitted)="sendMessage($event)" />
  </section>
</div>
