<div class="create-page">
  <app-page-header
    eyebrow="Cadastro"
    title="Nova transacao"
    subtitle="Registre a movimentacao com os principais dados financeiros do lancamento."
  />

  <app-section-card
    title="Dados da transacao"
    subtitle="Descricao, valor, moeda, tipo, data e referencias opcionais de categoria ou cartao."
  >
    <form class="create-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="create-page__grid">
        <app-form-field
          [form]="form"
          controlName="description"
          label="Descricao"
          placeholder="Exemplo: fatura mensal da AWS"
        />
        <app-form-field
          [form]="form"
          controlName="type"
          label="Tipo"
          type="select"
          [options]="typeOptions"
        />
        <app-form-field
          [form]="form"
          controlName="amount"
          label="Valor"
          type="number"
          placeholder="0.00"
        />
        <app-form-field
          [form]="form"
          controlName="currency"
          label="Moeda"
          placeholder="USD"
        />
        <app-form-field [form]="form" controlName="occurredOn" label="Data da ocorrencia" type="date" />
        <app-form-field [form]="form" controlName="categoryId" label="Categoria" type="select" [options]="categoryOptions()" />
        <app-form-field [form]="form" controlName="cardId" label="Cartao" type="select" [options]="cardOptions()" />
        <app-form-field [form]="form" controlName="notes" label="Observacoes" type="textarea" placeholder="Anotacao interna opcional" />
      </div>

      <div class="create-page__actions">
        <app-secondary-button routerLink="/transactions">Cancelar</app-secondary-button>
        <app-primary-button type="submit" [disabled]="saving()">
          {{ saving() ? 'Salvando...' : 'Criar transacao' }}
        </app-primary-button>
      </div>
    </form>
  </app-section-card>
</div>
