<div class="create-page">
  <app-page-header
    eyebrow="Create"
    title="Add a new transaction"
    subtitle="Capture the movement with the exact payload shape documented by the transactions endpoint."
  />

  <app-section-card
    title="Transaction details"
    subtitle="Description, amount, currency, type, date, and optional category or card references."
  >
    <form class="create-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="create-page__grid">
        <app-form-field
          [form]="form"
          controlName="description"
          label="Description"
          placeholder="Example: AWS monthly invoice"
        />
        <app-form-field
          [form]="form"
          controlName="type"
          label="Type"
          type="select"
          [options]="typeOptions"
        />
        <app-form-field
          [form]="form"
          controlName="amount"
          label="Amount"
          type="number"
          placeholder="0.00"
        />
        <app-form-field
          [form]="form"
          controlName="currency"
          label="Currency"
          placeholder="USD"
        />
        <app-form-field [form]="form" controlName="occurredOn" label="Occurred on" type="date" />
        <app-form-field [form]="form" controlName="categoryId" label="Category" type="select" [options]="categoryOptions()" />
        <app-form-field [form]="form" controlName="cardId" label="Card" type="select" [options]="cardOptions()" />
        <app-form-field [form]="form" controlName="notes" label="Notes" type="textarea" placeholder="Optional internal note" />
      </div>

      <div class="create-page__actions">
        <app-secondary-button routerLink="/transactions">Cancel</app-secondary-button>
        <app-primary-button type="submit" [disabled]="saving()">
          {{ saving() ? 'Saving...' : 'Create transaction' }}
        </app-primary-button>
      </div>
    </form>
  </app-section-card>
</div>
