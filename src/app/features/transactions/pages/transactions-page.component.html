<div class="feature-page">
  <app-page-header
    eyebrow="Movimentação"
    title="Transações"
    subtitle="Revise entradas e saídas com categoria, cartão e data de ocorrência."
  >
    <app-primary-button actions icon="plus" routerLink="/transactions/new">Nova transação</app-primary-button>
  </app-page-header>

  <section class="feature-page__stats">
    <app-stat-card
      label="Receitas do mês"
      [value]="incomeTotal() | currency: 'BRL' : 'symbol' : '1.2-2'"
      icon="trend"
      change="Entradas confirmadas"
      tone="success"
    />
    <app-stat-card
      label="Despesas do mês"
      [value]="expenseTotal() | currency: 'BRL' : 'symbol' : '1.2-2'"
      icon="transactions"
      change="Saídas em acompanhamento"
      tone="danger"
    />
  </section>

  @if (loading() && !transactions().length) {
    <app-loading-state label="Carregando transações..." />
  } @else if (transactions().length) {
    <app-table-card
      title="Todas as transações"
      subtitle="Histórico recente da movimentação financeira da conta."
    >
      <app-data-table [columns]="columns" [rows]="transactions()" trackByKey="id" />
    </app-table-card>
  } @else {
    <app-empty-state
      title="Nenhuma transação por aqui"
      description="Cadastre a primeira movimentação para montar uma linha do tempo confiável."
      icon="transactions"
    />
  }
</div>
