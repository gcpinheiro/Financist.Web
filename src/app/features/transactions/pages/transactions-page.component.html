<div class="feature-page">
  <app-page-header
    eyebrow="Movimento"
    title="Lancamentos"
    subtitle="Revise entradas e saidas com categoria, cartao e data de ocorrencia."
  >
    <app-primary-button actions icon="plus" routerLink="/transactions/new">Nova transacao</app-primary-button>
  </app-page-header>

  <section class="feature-page__stats">
    <app-stat-card
      label="Receitas no periodo"
      [value]="incomeTotal() | currency: 'USD' : 'symbol' : '1.0-0'"
      icon="trend"
      change="Entradas confirmadas"
      tone="success"
    />
    <app-stat-card
      label="Despesas no periodo"
      [value]="expenseTotal() | currency: 'USD' : 'symbol' : '1.0-0'"
      icon="transactions"
      change="Saidas em acompanhamento"
      tone="danger"
    />
  </section>

  @if (loading() && !transactions().length) {
    <app-loading-state label="Carregando transacoes..." />
  } @else if (transactions().length) {
    <app-table-card
      title="Todas as transacoes"
      subtitle="Historico recente da movimentacao financeira da conta."
    >
      <app-data-table [columns]="columns" [rows]="transactions()" trackByKey="id" />
    </app-table-card>
  } @else {
    <app-empty-state
      title="Nenhuma transacao por aqui"
      description="Cadastre a primeira movimentacao para montar uma linha do tempo confiavel."
      icon="transactions"
    />
  }
</div>
