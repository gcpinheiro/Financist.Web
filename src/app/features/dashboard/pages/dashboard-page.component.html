<div class="dashboard-page">
  <app-page-header
    eyebrow="Overview"
    title="Financial command center"
    subtitle="A high-level view of balances, ledger activity, and goal progress based on the live API."
  />

  @if (loading() && !summary()) {
    <app-loading-state label="Building your dashboard..." />
  } @else if (summary(); as summaryValue) {
    <section class="dashboard-page__stats">
      <app-stat-card
        label="Balance"
        [value]="summaryValue.balance | currency: 'USD' : 'symbol' : '1.0-0'"
        icon="wallet"
        helper="Net result from recorded income and expenses"
        tone="primary"
      />
      <app-stat-card
        label="Total income"
        [value]="summaryValue.totalIncome | currency: 'USD' : 'symbol' : '1.0-0'"
        icon="trend"
        [change]="summaryValue.transactionCount + ' transactions'"
        helper="Captured in the current ledger"
        tone="success"
      />
      <app-stat-card
        label="Total expenses"
        [value]="summaryValue.totalExpenses | currency: 'USD' : 'symbol' : '1.0-0'"
        icon="transactions"
        helper="Current outflow recorded by the API"
        tone="warning"
      />
      <app-stat-card
        label="Goals tracked"
        [value]="summaryValue.goalCount.toString()"
        icon="target"
        [change]="summaryValue.averageGoalProgress + '% avg progress'"
        helper="Across all active goals"
        tone="info"
      />
    </section>

    <section class="dashboard-page__detail">
      @if (recentTransactions().length) {
        <app-table-card
          title="Recent transactions"
          subtitle="Latest ledger entries pulled from the transactions endpoint."
        >
          <app-data-table
            [columns]="recentTransactionsColumns"
            [rows]="recentTransactions()"
            trackByKey="id"
          />
        </app-table-card>
      } @else {
        <app-empty-state
          title="No transactions returned"
          description="Create transactions or connect data so the dashboard can show live ledger activity."
          icon="transactions"
        />
      }

      @if (goalSnapshot().length) {
        <app-table-card
          title="Goal snapshot"
          subtitle="Progress summary built from the goals endpoint."
        >
          <app-data-table [columns]="goalColumns" [rows]="goalSnapshot()" trackByKey="id" />
        </app-table-card>
      } @else {
        <app-empty-state
          title="No goals returned"
          description="Create a goal to populate progress insights on the dashboard."
          icon="goals"
        />
      }
    </section>
  }
</div>
