<div class="dashboard-page">
  <app-page-header
    eyebrow="Resumo"
    title="Visao financeira do dia"
    subtitle="Um panorama de saldos, movimentacoes recentes e andamento das metas."
  />

  @if (loading() && !summary()) {
    <app-loading-state label="Montando sua visao geral..." />
  } @else if (summary(); as summaryValue) {
    <section class="dashboard-page__stats">
      <app-stat-card
        label="Saldo total"
        [value]="summaryValue.balance | currency: 'USD' : 'symbol' : '1.0-0'"
        icon="wallet"
        helper="Resultado acumulado entre entradas e saidas"
        tone="neutral"
      />
      <app-stat-card
        label="Receitas"
        [value]="summaryValue.totalIncome | currency: 'USD' : 'symbol' : '1.0-0'"
        icon="trend"
        [change]="summaryValue.transactionCount + ' lancamentos'"
        helper="Entradas registradas no periodo"
        tone="success"
      />
      <app-stat-card
        label="Despesas"
        [value]="summaryValue.totalExpenses | currency: 'USD' : 'symbol' : '1.0-0'"
        icon="transactions"
        helper="Saidas registradas no periodo"
        tone="danger"
      />
      <app-stat-card
        label="Metas acompanhadas"
        [value]="summaryValue.goalCount.toString()"
        icon="target"
        [change]="summaryValue.averageGoalProgress + '% de progresso medio'"
        helper="Entre todas as metas ativas"
        tone="info"
      />
    </section>

    <section class="dashboard-page__detail">
      @if (recentTransactions().length) {
        <app-table-card
          title="Transacoes recentes"
          subtitle="Ultimos lancamentos recebidos na sua linha do tempo financeira."
        >
          <app-data-table
            [columns]="recentTransactionsColumns"
            [rows]="recentTransactions()"
            trackByKey="id"
          />
        </app-table-card>
      } @else {
        <app-empty-state
          title="Nenhuma transacao encontrada"
          description="Cadastre movimentacoes para ver a atividade recente aqui."
          icon="transactions"
        />
      }

      @if (goalSnapshot().length) {
        <app-table-card
          title="Andamento das metas"
          subtitle="Resumo do progresso atual para acompanhar reservas e objetivos."
        >
          <app-data-table [columns]="goalColumns" [rows]="goalSnapshot()" trackByKey="id" />
        </app-table-card>
      } @else {
        <app-empty-state
          title="Nenhuma meta cadastrada"
          description="Crie uma meta para acompanhar progresso e prioridade nesta visao."
          icon="goals"
        />
      }
    </section>
  }
</div>
