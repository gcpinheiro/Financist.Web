<div class="create-page">
  <app-page-header
    eyebrow="Create"
    title="Create a savings goal"
    subtitle="Map the target, current progress, deadline, and category so momentum stays measurable."
  />

  <app-section-card
    title="Goal configuration"
    subtitle="Goals become more useful when they align with categories and track against a clear deadline."
  >
    <form class="create-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="create-page__grid">
        <app-form-field [form]="form" controlName="name" label="Goal name" placeholder="Emergency reserve" />
        <app-form-field
          [form]="form"
          controlName="category"
          label="Category"
          type="select"
          [options]="categoryOptions()"
        />
        <app-form-field [form]="form" controlName="targetAmount" label="Target amount" type="number" />
        <app-form-field [form]="form" controlName="currentAmount" label="Current amount" type="number" />
        <app-form-field [form]="form" controlName="deadline" label="Deadline" type="date" />
        <app-form-field [form]="form" controlName="color" label="Color token" placeholder="#6ea8fe" />
      </div>

      <div class="create-page__actions">
        <app-secondary-button routerLink="/goals">Cancel</app-secondary-button>
        <app-primary-button type="submit" [disabled]="saving()">
          {{ saving() ? 'Saving...' : 'Create goal' }}
        </app-primary-button>
      </div>
    </form>
  </app-section-card>
</div>
