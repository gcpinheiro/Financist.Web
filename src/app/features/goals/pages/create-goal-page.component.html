<div class="create-page">
  <app-page-header
    eyebrow="Cadastro"
    title="Nova meta"
    subtitle="Defina o objetivo, o valor inicial e a moeda para acompanhar a evolucao."
  />

  <app-section-card
    title="Configuracao da meta"
    subtitle="Nome, descricao, valor alvo, moeda e valor inicial para o acompanhamento."
  >
    <form class="create-page__form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="create-page__grid">
        <app-form-field [form]="form" controlName="name" label="Nome da meta" placeholder="Reserva de emergencia" />
        <app-form-field [form]="form" controlName="description" label="Descricao" type="textarea" placeholder="Contexto opcional para esta meta" />
        <app-form-field [form]="form" controlName="targetAmount" label="Valor objetivo" type="number" />
        <app-form-field [form]="form" controlName="currency" label="Moeda" placeholder="USD" />
        <app-form-field [form]="form" controlName="initialAmount" label="Valor inicial" type="number" />
      </div>

      <div class="create-page__actions">
        <app-secondary-button routerLink="/goals">Cancelar</app-secondary-button>
        <app-primary-button type="submit" [disabled]="saving()">
          {{ saving() ? 'Salvando...' : 'Criar meta' }}
        </app-primary-button>
      </div>
    </form>
  </app-section-card>
</div>
