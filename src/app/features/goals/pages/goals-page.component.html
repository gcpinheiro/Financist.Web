<div class="feature-page">
  <app-page-header
    eyebrow="Planejamento"
    title="Metas financeiras"
    subtitle="Mantenha objetivos de reserva e investimento sempre visíveis."
  >
    <app-primary-button actions icon="plus" routerLink="/goals/new">Nova meta</app-primary-button>
  </app-page-header>

  @if (loading() && !goals().length) {
    <app-loading-state label="Carregando metas..." />
  } @else if (goals().length) {
    <app-table-card
      title="Metas ativas"
      subtitle="Acompanhe progresso, valor atual e objetivo de cada meta."
    >
      <app-data-table [columns]="columns" [rows]="goals()" trackByKey="id" />
    </app-table-card>
  } @else {
    <app-empty-state
      title="Nenhuma meta cadastrada"
      description="Crie metas para manter prioridades financeiras em destaque."
      icon="goals"
    />
  }
</div>
